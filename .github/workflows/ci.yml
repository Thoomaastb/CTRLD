name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Go: Lint + Build + Test ────────────────────────────────────────────────
  go:
    name: Go (Lint + Build + Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-coverage
          path: coverage.out

  # ─── Node: Lint + Type-Check + Build ────────────────────────────────────────
  node:
    name: Node (Lint + Type-Check + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        # Alle Node-Steps laufen im web/-Unterverzeichnis
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Verhindert dass Next.js den Build wegen Telemetrie-Prompt abbricht
          NEXT_TELEMETRY_DISABLED: "1"
