name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (Lint + Build + Test)
    runs-on: ubuntu-latest
    env:
      GONOSUMDB: "github.com/Thoomaastb/CTRLD"
      GONOPROXY: "github.com/Thoomaastb/CTRLD"
      GOFLAGS: "-mod=mod"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

  node:
    name: Node (Lint + Type-Check + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  security:
    name: Security / Go vulnerability scan
    runs-on: ubuntu-latest
    env:
      GONOSUMDB: "github.com/Thoomaastb/CTRLD"
      GONOPROXY: "github.com/Thoomaastb/CTRLD"
      GOFLAGS: "-mod=mod"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          govulncheck ./... || EXIT=$?
          if [ "${EXIT}" = "3" ]; then
            echo "govulncheck: informational findings only (exit 3), continuing"
            exit 0
          else
            exit ${EXIT:-0}
          fi
