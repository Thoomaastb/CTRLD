name: Security

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check if go.sum exists
        id: go-check
        run: |
          if [ -f "go.sum" ] && find . -name "*.go" -not -path "./.git/*" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No go.sum yet — skipping govulncheck"
          fi

      - name: Set up Go
        if: steps.go-check.outputs.exists == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        if: steps.go-check.outputs.exists == 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        if: steps.go-check.outputs.exists == 'true'
        # Exit code 3 = vulnerabilities found only in non-called code (informational, not blocking)
        # Exit code 1 = vulnerabilities in actually called code (blocking)
        run: |
          govulncheck ./... || EXIT=$?
          if [ "${EXIT}" = "3" ]; then
            echo "::warning::govulncheck found vulnerabilities in imported but uncalled code — review recommended"
            exit 0
          fi
          exit ${EXIT:-0}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check if package-lock.json exists
        id: node-check
        run: |
          if [ -f "web/package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No package-lock.json yet — skipping npm audit"
          fi

      - name: Set up Node
        if: steps.node-check.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.node-check.outputs.exists == 'true'
        working-directory: web
        run: npm ci

      - name: Run npm audit
        if: steps.node-check.outputs.exists == 'true'
        working-directory: web
        run: npm audit --audit-level=high

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript]
    steps:
      - uses: actions/checkout@v6

      - name: Check if language source exists
        id: src-check
        run: |
          if [ "${{ matrix.language }}" = "go" ]; then
            if find . -name "*.go" -not -path "./.git/*" | grep -q .; then
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          else
            if [ -f "web/package.json" ] && [ -d "web/src" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Initialize CodeQL
        if: steps.src-check.outputs.exists == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: steps.src-check.outputs.exists == 'true'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        if: steps.src-check.outputs.exists == 'true'
        uses: github/codeql-action/analyze@v4