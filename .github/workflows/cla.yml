name: CLA

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  cla-check:
    name: CLA check
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: docs/cla/signatures.json
          path-to-document: https://github.com/Thoomaastb/CTRLD/blob/main/docs/cla/CLA.md
          branch: main
          allowlist: Thoomaastb,bot*,dependabot[bot],github-actions[bot]
          remote-organization-name: Thoomaastb
          remote-repo-name: CTRLD
