# CTRLD Konfiguration
# Kopiere diese Datei nach /etc/ctrld/config.yaml und passe sie an.
# Alle Werte können auch als Umgebungsvariablen gesetzt werden: CTRLD_<KEY>
# Beispiel: CTRLD_SECURITY_JWT_SECRET=mein-secret

server:
  host: "0.0.0.0"
  port: 8443
  # TLS-Zertifikat (empfohlen für Produktion)
  # tls_cert_file: "/etc/ctrld/tls/cert.pem"
  # tls_key_file: "/etc/ctrld/tls/key.pem"
  read_timeout_sec: 10
  write_timeout_sec: 30
  idle_timeout_sec: 120

log:
  level: "info"       # trace, debug, info, warn, error
  format: "json"      # json (Produktion) oder pretty (Entwicklung)

security:
  # JWT-Secret: ZWINGEND ERFORDERLICH — min. 32 zufällige Zeichen
  # Generieren mit: openssl rand -hex 32
  jwt_secret: "HIER-ZUFAELLIGES-SECRET-EINSETZEN-MIN-32-ZEICHEN"
  jwt_access_ttl_min: 15    # Access Token Gültigkeit (Minuten)
  jwt_refresh_ttl_day: 7    # Refresh Token Gültigkeit (Tage)
  # Argon2id Parameter (OWASP-Empfehlung — nur für Experten ändern)
  argon_memory: 65536       # 64 MB
  argon_iterations: 3
  argon_parallelism: 2

database:
  path: "/var/lib/ctrld/ctrld.db"
