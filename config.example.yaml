# CTRLD Configuration — Example
# Copy to config.yaml and adjust to your environment.
# Never commit config.yaml — it's in .gitignore.

server:
  # Port CTRLD listens on (HTTPS)
  port: 8443

  # TLS configuration
  tls:
    # Path to TLS certificate (PEM). Leave empty to use auto-generated self-signed cert.
    cert_file: ""
    # Path to TLS private key (PEM). Leave empty to use auto-generated self-signed cert.
    key_file: ""

auth:
  # Session timeout in minutes (default: 30)
  session_timeout_minutes: 30

  # Maximum concurrent sessions per user (default: 5, 0 = unlimited)
  max_sessions_per_user: 5

  # Bind session to client IP — invalidates session on IP change (default: true)
  ip_binding: true

pim:
  # Maximum PIM session duration in minutes (default: 60)
  max_duration_minutes: 60

  # Minimum reason length in characters (default: 10)
  min_reason_length: 10

  # Require MFA re-authentication for every PIM activation (default: true, do not disable)
  require_mfa: true

database:
  # Path to SQLite database file
  path: /var/lib/ctrld/ctrld.db

logging:
  # Log level: debug, info, warn, error (default: info)
  level: info

  # Log format: json, text (default: json)
  format: json

alerts:
  # CPU usage threshold in percent (default: 90)
  cpu_threshold: 90

  # RAM usage threshold in percent (default: 85)
  ram_threshold: 85

  # Disk usage threshold in percent (default: 90)
  disk_threshold: 90

  # SMTP configuration for email alerts (optional)
  smtp:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    to: ""
