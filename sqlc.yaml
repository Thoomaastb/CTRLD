version: "2"

sql:
  - engine: "sqlite"
    queries: "internal/db/queries"
    schema:  "internal/db/migrations"
    gen:
      go:
        package:              "db"
        out:                  "internal/db/generated"
        emit_json_tags:       true
        emit_prepared_queries: false
        emit_interface:       true
        emit_exact_table_names: false
        emit_empty_slices:    true
        # Nullbare Felder als sql.Null* Typen
        null_style:           "sql"
